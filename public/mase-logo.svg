  <!-- wordmark -->
  <text x="182" y="112" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif"
        font-weight="800" font-size="104" letter-spacing="-1" fill="url(#maseBlue)">MASE</text>
  <!-- tagline -->
  <text x="186" y="146" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif"
        font-weight="600" font-size="20" letter-spacing="5" fill="#5b6b7e">AGENTS THAT CLOSE</text>
</svg>
